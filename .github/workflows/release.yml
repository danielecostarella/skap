name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build app bundle
        run: bash scripts/package-app.sh
        env:
          CONFIGURATION: release

      - name: Create ZIP
        run: |
          ditto -c -k --keepParent dist/Skap.app "dist/Skap-${{ github.ref_name }}.zip"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Skap ${{ github.ref_name }}" \
            -srcfolder dist/Skap.app \
            -ov \
            -format UDZO \
            "dist/Skap-${{ github.ref_name }}.dmg"

      - name: Compute checksums
        id: checksums
        run: |
          ZIP_SHA=$(shasum -a 256 "dist/Skap-${{ github.ref_name }}.zip" | awk '{print $1}')
          DMG_SHA=$(shasum -a 256 "dist/Skap-${{ github.ref_name }}.dmg" | awk '{print $1}')
          echo "zip_sha=$ZIP_SHA" >> "$GITHUB_OUTPUT"
          echo "dmg_sha=$DMG_SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "dist/Skap-${{ github.ref_name }}.zip" \
            "dist/Skap-${{ github.ref_name }}.dmg" \
            --title "skap ${{ github.ref_name }}" \
            --generate-notes \
            --notes-start-tag "$(git tag --sort=-version:refname | sed -n '2p')"

      - name: Print checksums
        run: |
          echo "ZIP SHA256: ${{ steps.checksums.outputs.zip_sha }}"
          echo "DMG SHA256: ${{ steps.checksums.outputs.dmg_sha }}"
          echo ""
          echo "Update Casks/skap.rb with these values for the Homebrew cask."

